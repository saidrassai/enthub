apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: rag-platform
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      trace_idle_period: 10s
    compactor:
      compaction:
        block_retention: 14d
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo