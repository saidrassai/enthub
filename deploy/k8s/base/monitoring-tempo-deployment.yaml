apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: rag-platform
  labels:
    app: tempo
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
        component: monitoring
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:2.4
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: storage
              mountPath: /var/tempo
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: storage
          emptyDir: {}