apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: rag-platform
  labels:
    app: langfuse
    component: observability
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
        component: observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io.path: "/api/public/metrics"
    spec:
      containers:
        - name: langfuse
          image: langfuse/langfuse:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: langfuse-database-url
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: langfuse-nextauth-secret
            - name: NEXTAUTH_URL
              value: "https://langfuse.rag.yourcompany.com"
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: minio-access-key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: minio-secret-key
            - name: S3_ENDPOINT
              value: "http://minio.rag-platform.svc.cluster.local:9000"
            - name: S3_BUCKET
              value: "langfuse"
            - name: S3_REGION
              value: "us-east-1"
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: langfuse-salt
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10