apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-platform

resources:
  - namespace.yaml
  - rag-deployment.yaml
  - rag-service.yaml
  - qdrant-statefulset.yaml
  - qdrant-service.yaml
  - vllm-deployment.yaml
  - keycloak-deployment.yaml
  - keycloak-service.yaml
  - langfuse-deployment.yaml
  - langfuse-service.yaml
  - monitoring-prometheus.yaml
  - monitoring-grafana.yaml
  - monitoring-loki-config.yaml
  - monitoring-loki-deployment.yaml
  - monitoring-loki-service.yaml
  - monitoring-tempo-config.yaml
  - monitoring-tempo-deployment.yaml
  - monitoring-tempo-service.yaml
  - ingress.yaml
  - network-policies.yaml

commonLabels:
  platform: enterprise-agentic-rag
  managed-by: kustomize

configMapGenerator:
  - name: rag-config
    literals:
      - LLM_ENDPOINT=http://vllm-llm:8000
      - EMBED_ENDPOINT=http://embed:8000
      - RERANK_ENDPOINT=http://rerank:8000
      - VLM_ENDPOINT=http://vlm:8000
      - PARSE_ENDPOINT=http://parse:8000
      - QDRANT_URL=http://qdrant:6333
      - GUARDRAILS_ENDPOINT=http://guardrails:8000
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=rag-platform
      - KEYCLOAK_CLIENT_ID=rag-api
      - LANGFUSE_HOST=http://langfuse:3000
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_TENANT=demo
      - TENANT_RESOLUTION=header
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - ENABLE_VLM=true
      - ENABLE_MULTIMODAL=true
      - ENABLE_AGENTIC=true
      - ENABLE_GUARDRAILS=true
      - ENABLE_CACHING=true

secretGenerator:
  - name: rag-secrets
    literals:
      - POSTGRES_PASSWORD=changeme
      - KEYCLOAK_ADMIN_PASSWORD=changeme
      - KEYCLOAK_DB_PASSWORD=changeme
      - KEYCLOAK_CLIENT_SECRET=changeme
      - MINIO_ROOT_PASSWORD=changeme
      - HF_TOKEN=
      - JWT_SECRET_KEY=changeme-generate-with-openssl-rand-base64-32
      - LANGFUSE_NEXTAUTH_SECRET=changeme
      - LANGFUSE_SECRET_KEY=changeme
      - LANGFUSE_SALT=changeme
      - LANGFUSE_DATABASE_URL=postgresql://rag:changeme@postgres:5432/langfuse
      - LANGFUSE_PUBLIC_KEY=
      - GRAFANA_PASSWORD=changeme
      - ADMIN_API_KEYS=