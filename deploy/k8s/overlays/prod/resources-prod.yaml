apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-platform
spec:
  template:
    spec:
      containers:
        - name: rag-api
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: rag-platform
spec:
  template:
    spec:
      containers:
        - name: qdrant
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "16Gi"