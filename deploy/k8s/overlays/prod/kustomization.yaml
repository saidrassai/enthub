apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-platform

resources:
  - ../../base
  - rag-api-prod.yaml
  - qdrant-prod.yaml
  - hpa.yaml

commonLabels:
  environment: production

replicas:
  - name: rag-api
    count: 5
  - name: langfuse
    count: 3
  - name: qdrant
    count: 3

configMapGenerator:
  - name: rag-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ENABLE_VLM=true
      - ENABLE_MULTIMODAL=true
      - ENABLE_CACHING=true