apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rag-platform

resources:
  - ../../base

commonLabels:
  environment: dev

replicas:
  - name: rag-api
    count: 1
  - name: langfuse
    count: 1

configMapGenerator:
  - name: rag-config
    behavior: merge
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - ENABLE_VLM=false
      - ENABLE_MULTIMODAL=false