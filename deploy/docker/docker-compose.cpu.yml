version: '3.8'

# =============================================================================
# CPU-ONLY OVERRIDES — llama.cpp for LLM/VLM, CPU embeddings/reranker
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d
# =============================================================================

services:
  llm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: rag-llm-cpu
    command: >
      -m /models/${LLM_MODEL_FILE:-Qwen2.5-14B-Instruct-Q4_K_M.gguf}
      -c 8192
      --host 0.0.0.0
      --port 8000
      --embedding
      --parallel 4
      --ctx-size 8192
      --batch-size 512
      --ubatch-size 512
      --flash-attn
      --mlock
      --no-mmap
      --n-gpu-layers 0
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./models:/models:ro
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 16G
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 3

  vlm:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: rag-vlm-cpu
    profiles: ["vlm"]
    command: >
      -m /models/${VLM_MODEL_FILE:-Qwen2-VL-2B-Instruct-Q4_K_M.gguf}
      -c 4096
      --host 0.0.0.0
      --port 8000
      --mmproj /models/${VLM_MMPROJ_FILE:-mmproj-Qwen2-VL-2B-f16.gguf}
      --n-gpu-layers 0
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./models:/models:ro
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8004:8000"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - rag-network

  embed:
    environment:
      EMBED_DEVICE: cpu
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  rerank:
    environment:
      RERANK_DEVICE: cpu
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # Disable GPU reservations for other services
  parse:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  guardrails:
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G