version: '3.8'

# =============================================================================
# GPU OVERRIDES — Full stack with GPU acceleration
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# =============================================================================

services:
  llm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    environment:
      VLLM_MODEL: ${LLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
      VLLM_GPU_MEMORY_UTILIZATION: 0.85
      VLLM_TENSOR_PARALLEL_SIZE: 1
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}

  vlm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    environment:
      VLLM_MODEL: ${VLM_MODEL:-Qwen/Qwen2-VL-7B-Instruct}
      VLLM_GPU_MEMORY_UTILIZATION: 0.8

  embed:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    environment:
      EMBED_DEVICE: cuda

  rerank:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    environment:
      RERANK_DEVICE: cuda

  # Enable VLM profile
  # docker compose --profile gpu-full --profile vlm up -d