# Traefik Dynamic Configuration - Routers
http:
  routers:
    # RAG API
    rag-api:
      rule: "PathPrefix(`/v1`) || PathPrefix(`/health`)"
      service: rag-api
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rag-ratelimit
        - rag-auth

    # Langfuse
    langfuse:
      rule: "Host(`langfuse.${DOMAIN:-localhost}`)"
      service: langfuse
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rag-auth

    # Grafana
    grafana:
      rule: "Host(`grafana.${DOMAIN:-localhost}`)"
      service: grafana
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rag-auth

    # Keycloak
    keycloak:
      rule: "Host(`keycloak.${DOMAIN:-localhost}`)"
      service: keycloak
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    # Qdrant Dashboard
    qdrant:
      rule: "Host(`qdrant.${DOMAIN:-localhost}`)"
      service: qdrant
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rag-auth

    # MinIO Console
    minio-console:
      rule: "Host(`minio.${DOMAIN:-localhost}`)"
      service: minio-console
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - rag-auth

    # Traefik Dashboard
    traefik-dashboard:
      rule: "Host(`traefik.${DOMAIN:-localhost}`)"
      service: api@internal
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - traefik-auth