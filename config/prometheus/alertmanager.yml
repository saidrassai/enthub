# Alertmanager Configuration
global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@rag-platform.local'
  smtp_auth_username: ''
  smtp_auth_password: ''
  smtp_require_tls: false

route:
  group_by: ['alertname', 'tenant']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'
    - match_re:
        tenant: '.+'
      receiver: 'tenant-alerts'
      group_by: ['tenant', 'alertname']

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@rag-platform.local'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#rag-alerts'
        send_resolved: true
        title: 'RAG Platform Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@rag-platform.local'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#rag-critical'
        send_resolved: true
        title: '🔴 CRITICAL: RAG Platform'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_KEY}'
        severity: critical
        description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'team@rag-platform.local'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#rag-warnings'
        send_resolved: true
        title: '🟡 WARNING: RAG Platform'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'tenant-alerts'
    email_configs:
      - to: '${TENANT_EMAIL}'
        send_resolved: true
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#rag-tenant-{{ .Labels.tenant }}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'tenant']

  - source_match:
      alertname: 'RAGQueryCriticalErrorRate'
    target_match:
      alertname: 'RAGQueryHighErrorRate'
    equal: ['tenant']