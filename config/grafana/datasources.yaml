apiVersion: 1

datasources:
  # Prometheus
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"

  # Loki
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: trace_id
          matcherRegex: "trace_id=(\\w+)"
          url: "http://tempo:3200/tempo/trace/$${__value.raw}"
          datasourceUid: tempo

  # Tempo
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: "GET"
      tracesToLogs:
        datasourceUid: loki
        tags: ["job", "instance", "pod", "namespace"]
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false

  # Langfuse (PostgreSQL)
  - name: Langfuse
    type: postgres
    uid: langfuse
    access: proxy
    url: postgres:5432
    database: langfuse
    user: rag
    secureJsonData:
      password: "${POSTGRES_PASSWORD}"
    jsonData:
      sslmode: "disable"
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400

  # Qdrant (for vector metrics)
  - name: Qdrant
    type: prometheus
    uid: qdrant
    access: proxy
    url: http://qdrant:6333
    editable: false

  # vLLM
  - name: vLLM
    type: prometheus
    uid: vllm
    access: proxy
    url: http://llm:8000
    editable: false